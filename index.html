<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跨市ETF雷达</title>
    <meta
      name="description"
      content="基于美股主题ETF强弱，映射A股场内ETF候选池的一页投资看板。"
    />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B4PWH30B3G"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-B4PWH30B3G');
    </script>
    <link rel="stylesheet" href="./src/styles.css?v=20260603m" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">美股主题到A股ETF映射</p>
          <h1>跨市ETF雷达</h1>
          <p class="subtitle">多周期强弱、主题传导、A股场内ETF候选池</p>
        </div>
        <div class="status-panel" aria-label="数据更新状态">
          <span id="update-time">数据更新 读取中</span>
          <span>刷新频率：每日 08:00 / 18:00</span>
        </div>
      </header>

      <nav class="page-tabs" aria-label="页面板块">
        <button class="page-tab active" data-page-tab="radar" type="button">主题雷达</button>
        <button class="page-tab" data-page-tab="people" type="button">人物跟踪</button>
      </nav>

      <section class="summary-grid" id="summary-grid" data-page-panel="radar" aria-label="市场摘要"></section>

      <section class="toolbar" data-page-panel="radar" aria-label="筛选工具">
        <div class="segmented" role="tablist" aria-label="周期维度">
          <button class="segment active" data-horizon="short" type="button">短期</button>
          <button class="segment" data-horizon="mid" type="button">中期</button>
          <button class="segment" data-horizon="long" type="button">长期</button>
          <button class="segment" data-horizon="all" type="button">综合</button>
        </div>
        <div class="segmented compact" role="tablist" aria-label="信号类型">
          <button class="segment active" data-signal="all" type="button">全部</button>
          <button class="segment" data-signal="共振" type="button" title="美股主题ETF与A股ETF多周期同向，映射可靠度较高。">共振</button>
          <button class="segment" data-signal="传导" type="button" title="美股主题先动，A股ETF尚未完全跟上，适合观察跨市场传导。">传导</button>
          <button class="segment" data-signal="背离" type="button" title="美股与A股ETF走势不同步或相反，需要结合本土因素二次确认。">背离</button>
        </div>
        <div class="signal-guide" aria-label="信号说明">
          <span><b>共振</b>：两边同向</span>
          <span><b>传导</b>：美股先动</span>
          <span><b>背离</b>：走势不同步</span>
        </div>
        <label class="search-box">
          <span>搜索</span>
          <input id="theme-search" type="search" placeholder="搜索主题、代码或ETF名称" />
        </label>
      </section>

      <section class="workspace" data-page-panel="radar">
        <aside class="theme-list-panel" aria-label="美股主题ETF强弱榜">
          <div class="panel-heading">
            <div>
              <h2>美股主题强弱</h2>
              <p id="rank-caption">按短期强弱排序</p>
            </div>
            <div class="panel-actions">
              <button class="icon-btn" id="reset-view" type="button" title="重置视图" aria-label="重置视图">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 3-6.7" />
                  <path d="M3 4v6h6" />
                </svg>
              </button>
              <button class="panel-toggle icon-toggle" data-collapse-panel="list" type="button" aria-label="隐藏榜单" data-tooltip="隐藏榜单">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 5h7v14H4z" />
                  <path d="M15 8h5" />
                  <path d="M15 12h5" />
                  <path d="M15 16h5" />
                </svg>
              </button>
            </div>
          </div>
          <div class="theme-list" id="theme-list"></div>
        </aside>

        <div class="detail-stack">
          <section class="detail-panel" aria-label="主题映射详情">
            <div class="detail-panel-actions">
              <button class="panel-toggle icon-toggle" data-collapse-panel="detail" type="button" aria-label="隐藏详情" data-tooltip="隐藏详情">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M13 5h7v14h-7z" />
                  <path d="M4 8h5" />
                  <path d="M4 12h5" />
                  <path d="M4 16h5" />
                </svg>
              </button>
            </div>
            <div id="detail-view"></div>
          </section>

          <section class="data-section" aria-label="A股ETF候选池">
            <div class="panel-heading">
              <div>
                <h2>A股场内ETF候选池</h2>
                <p>随当前主题联动筛选，显示映射分数、强弱与流动性</p>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>代码</th>
                    <th><span class="help-label">映射 <button class="help-dot" type="button" data-help="映射分是A股ETF与当前美股主题的匹配度，综合主题标签、跟踪指数、成分方向、历史联动和流动性计算。分数越高，越适合作为对应观察标的。" title="映射分是A股ETF与当前美股主题的匹配度，综合主题标签、跟踪指数、成分方向、历史联动和流动性计算。分数越高，越适合作为对应观察标的。">?</button></span></th>
                    <th>1日</th>
                    <th>5日</th>
                    <th>20日</th>
                    <th>60日</th>
                    <th>120日</th>
                    <th>成交额</th>
                    <th>状态</th>
                  </tr>
                </thead>
                <tbody id="cn-etf-table"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>

      <section class="people-section hidden" data-page-panel="people" aria-label="人物跟踪"></section>
    </main>

    <script type="module" src="./src/app.js?v=20260603m"></script>
  </body>
</html>
