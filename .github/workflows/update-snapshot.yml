name: 更新数据快照

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-snapshot.yml"
      - "scripts/generate_snapshot.py"
      - "scripts/generate_people_snapshot.py"
      - "requirements.txt"
      - "data/latest.json"
      - "data/people-latest.json"
      - "src/data.js"
  schedule:
    - cron: "0 0 * * 1-6"
    - cron: "0 10 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装免费数据依赖
        run: python -m pip install -r requirements.txt

      - name: 生成数据快照
        run: |
          python scripts/generate_snapshot.py --skip-cn
          python scripts/generate_people_snapshot.py

      - name: 提交数据快照
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/people-latest.json src/data.js
          git diff --staged --quiet || git commit -m "data: 更新行情快照"
          git push
